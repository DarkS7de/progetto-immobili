spring.application.name=backend

# porta server
server.port=8080

# collegamento con server database (porta default modificata)
spring.datasource.url=jdbc:postgresql://localhost:5433/immobili_db
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# jpa/hibernate 'validate' per tabelle create a mano
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#logging
logging.level.org.springframework=INFO
logging.level.com.immobili=DEBUG

# security disabilitata
spring.security.user.name=temp
spring.security.user.password=temp

# no proxy hibernate serializzati
spring.jackson.serialization.fail-on-empty-beans=false