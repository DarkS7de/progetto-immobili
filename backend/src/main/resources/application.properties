# ========== NOME APPLICAZIONE ==========
spring.application.name=backend

# ========== SERVER ==========
server.port=8080

# ========== DATABASE POSTGRESQL ==========
spring.datasource.url=jdbc:postgresql://localhost:5433/immobili_db
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# ========== JPA / HIBERNATE ==========
# 'validate' = Hibernate controlla che le entità Java siano allineate alle tabelle, ma NON le modifica.
# Usiamo 'validate' perchè le tabelle le abbiamo già create a mano via SQL.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ========== LOGGING ==========
logging.level.org.springframework=INFO
logging.level.com.immobili=DEBUG

# ========== SECURITY (temporaneamente disabilitata, la configureremo poi) ==========
spring.security.user.name=temp
spring.security.user.password=temp

# Evita di serializzare i proxy interni di Hibernate nel JSON
spring.jackson.serialization.fail-on-empty-beans=false